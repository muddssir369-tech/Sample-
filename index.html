<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>3D Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<style>
  /* ============================================================
     EDIT THESE TWO VALUES BEFORE PUBLISHING — see comments below
     ============================================================ */
  :root{
    --bg:#0B1D3A;
    --panel:#0F2749;
    --line:#2A4A78;
    --line-soft:rgba(79,216,235,0.14);
    --cyan:#4FD8EB;
    --amber:#FFB84D;
    --ink:#EAF2FA;
    --muted:#7C93B3;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ margin:0; padding:0; height:100%; overflow:hidden; background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; }
  .mono{ font-family:'IBM Plex Mono',monospace; }

  #app{
    position:relative; height:100%; width:100%;
    background-image:
      repeating-linear-gradient(0deg, var(--line-soft) 0px, var(--line-soft) 1px, transparent 1px, transparent 28px),
      repeating-linear-gradient(90deg, var(--line-soft) 0px, var(--line-soft) 1px, transparent 1px, transparent 28px);
    background-position:-1px -1px;
  }

  #topbar{ position:absolute; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:14px 16px; z-index:20; pointer-events:none; }
  #topbar > *{ pointer-events:auto; }
  .brand{ display:flex; flex-direction:column; line-height:1.1; max-width:75%; }
  .brand .title{ font-size:14px; letter-spacing:.04em; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .brand .sub{ font-size:10px; letter-spacing:.1em; color:var(--muted); margin-top:3px; }
  .badge{ font-size:10px; letter-spacing:.08em; color:var(--cyan); border:1px solid var(--line); border-radius:2px; padding:4px 8px; background:rgba(79,216,235,0.06); flex-shrink:0; }

  .corner{ position:absolute; width:22px; height:22px; z-index:15; pointer-events:none; border-color:var(--cyan); opacity:.55; }
  .corner.tl{ top:56px; left:12px; border-top:2px solid; border-left:2px solid; }
  .corner.tr{ top:56px; right:12px; border-top:2px solid; border-right:2px solid; }
  .corner.bl{ bottom:16px; left:12px; border-bottom:2px solid; border-left:2px solid; }
  .corner.br{ bottom:16px; right:12px; border-bottom:2px solid; border-right:2px solid; }

  #canvas-wrap{ position:absolute; inset:0; z-index:1; }
  canvas{ display:block; touch-action:none; }

  #readout{
    position:absolute; bottom:16px; left:16px; z-index:20; font-size:10px; color:var(--muted);
    background:rgba(15,39,73,0.55); border:1px solid var(--line); border-radius:3px; padding:8px 10px; letter-spacing:.03em;
  }
  #readout .row{ display:flex; gap:6px; margin-bottom:2px; }
  #readout .k{ color:var(--cyan); }
  #readout .v{ color:var(--ink); }

  #hint{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); text-align:center; z-index:5; pointer-events:none;
    color:var(--muted); font-size:11px; letter-spacing:.05em; font-family:'IBM Plex Mono',monospace;
  }
  #hint .big{ color:var(--cyan); font-size:12px; margin-bottom:6px; display:block; }

  #loading{
    position:absolute; inset:0; z-index:30; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px;
    background:var(--bg); font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--cyan); letter-spacing:.08em; text-align:center; padding:20px;
  }
  #loading .spinner{
    width:26px; height:26px; border:2px solid var(--line); border-top-color:var(--cyan); border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  #error-box{
    position:absolute; inset:0; z-index:30; display:none; align-items:center; justify-content:center; padding:24px;
    background:var(--bg);
  }
  #error-box .box{
    border:1px solid #FF8B7A; border-radius:6px; padding:20px; max-width:340px; text-align:center;
    background:rgba(255,139,122,0.06);
  }
  #error-box .box h3{ margin:0 0 8px; color:#FF8B7A; font-size:13px; letter-spacing:.04em; }
  #error-box .box p{ margin:0; font-size:12px; color:var(--muted); line-height:1.5; font-family:'IBM Plex Mono',monospace; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="brand">
      <div class="title" id="page-title">3D Model</div>
      <div class="sub mono">DRAG TO ROTATE · PINCH TO ZOOM</div>
    </div>
    <div class="badge mono" id="fmt-badge">LOADING</div>
  </div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div id="readout">
    <div class="row"><span class="k mono">TRIS</span><span class="v mono" id="r-tris">—</span></div>
  </div>

  <div id="canvas-wrap"></div>
  <div id="hint"><span class="big">LOADING MODEL…</span></div>

  <div id="loading">
    <div class="spinner"></div>
    <div>LOADING MODEL…</div>
  </div>

  <div id="error-box">
    <div class="box">
      <h3 class="mono">COULDN'T LOAD MODEL</h3>
      <p id="error-msg">The model file could not be reached or recognized.</p>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';

/* ================================================================
   CONFIGURE YOUR MODEL HERE
   - MODEL_URL: paste your direct file link or Google Drive share link
   - PAGE_TITLE: shown at the top of the page
   ================================================================ */
const MODEL_URL = "https://raw.githubusercontent.com/muddssir369-tech/Sample-/refs/heads/main/sample.obj";
const PAGE_TITLE = "sample";
/* ================================================================ */

document.getElementById('page-title').textContent = PAGE_TITLE;
document.title = PAGE_TITLE;

const wrap = document.getElementById('canvas-wrap');
const hintEl = document.getElementById('hint');
const loadingEl = document.getElementById('loading');
const errorBox = document.getElementById('error-box');
const errorMsg = document.getElementById('error-msg');
const fmtBadge = document.getElementById('fmt-badge');
const rTris = document.getElementById('r-tris');

let scene, camera, renderer, controls, currentMesh;

function initScene(){
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.01, 2000);
  camera.position.set(2.4, 1.8, 2.4);

  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  wrap.appendChild(renderer.domElement);

  scene.add(new THREE.HemisphereLight(0xbfe6ff, 0x0b1d3a, 1.1));
  const dir = new THREE.DirectionalLight(0xffffff, 1.4);
  dir.position.set(3, 5, 2); scene.add(dir);
  const dir2 = new THREE.DirectionalLight(0x4fd8eb, 0.4);
  dir2.position.set(-3, -2, -4); scene.add(dir2);

  const grid = new THREE.GridHelper(6, 24, 0x2a4a78, 0x1a3358);
  grid.position.y = -0.98;
  scene.add(grid);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 0.5;
  controls.maxDistance = 20;

  window.addEventListener('resize', onResize);
  animate();
  loadConfiguredModel();
}

function onResize(){
  camera.aspect = wrap.clientWidth / wrap.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
}

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

function frameObject(obj){
  const box = new THREE.Box3().setFromObject(obj);
  const size = new THREE.Vector3(); box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  obj.scale.setScalar(1.6 / maxDim);
  const box2 = new THREE.Box3().setFromObject(obj);
  const center2 = new THREE.Vector3(); box2.getCenter(center2);
  obj.position.sub(center2);
  controls.target.set(0,0,0);
  camera.position.set(2.2, 1.6, 2.2);
  controls.update();
}

function countTriangles(obj){
  let count = 0;
  obj.traverse(o=>{
    if(o.isMesh && o.geometry){
      const g = o.geometry;
      count += (g.index ? g.index.count : g.attributes.position.count) / 3;
    }
  });
  return Math.round(count);
}

function defaultMaterial(){
  return new THREE.MeshStandardMaterial({ color:0x9fd8ff, metalness:0.15, roughness:0.55, emissive:0x0a2540, emissiveIntensity:0.15 });
}

function hasVertices(obj){
  let ok = false;
  obj.traverse(o=>{ if(o.isMesh && o.geometry && o.geometry.attributes.position && o.geometry.attributes.position.count > 0) ok = true; });
  return ok;
}

function resolveShareLink(url){
  try{
    const u = new URL(url);
    if(u.hostname.includes('drive.google.com')){
      let id = null;
      const m = u.pathname.match(/\/file\/d\/([^/]+)/);
      if(m) id = m[1];
      if(!id && u.searchParams.get('id')) id = u.searchParams.get('id');
      if(id) return 'https://drive.google.com/uc?export=download&id=' + id;
    }
    if(u.hostname.includes('dropbox.com')){
      u.searchParams.set('dl','1');
      return u.toString();
    }
    return url;
  }catch(e){ return url; }
}

function smartParse(buffer){
  return new Promise((resolve, reject) => {
    const gltfLoader = new GLTFLoader();
    gltfLoader.parse(buffer, '', (gltf) => resolve({ obj: gltf.scene, kind: 'GLTF/GLB' }), () => tryStl());

    function tryStl(){
      try{
        const stlLoader = new STLLoader();
        const geometry = stlLoader.parse(buffer);
        if(geometry && geometry.attributes.position && geometry.attributes.position.count > 0){
          geometry.computeVertexNormals();
          resolve({ obj: new THREE.Mesh(geometry, defaultMaterial()), kind: 'STL' });
        } else { tryObj(); }
      }catch(e){ tryObj(); }
    }

    function tryObj(){
      try{
        const text = new TextDecoder('utf-8').decode(buffer);
        const objLoader = new OBJLoader();
        const obj = objLoader.parse(text);
        if(hasVertices(obj)){
          obj.traverse(o=>{ if(o.isMesh) o.material = defaultMaterial(); });
          resolve({ obj, kind: 'OBJ' });
        } else {
          reject(new Error('Could not identify format'));
        }
      }catch(e){ reject(e); }
    }
  });
}

async function loadConfiguredModel(){
  if(!MODEL_URL || MODEL_URL === "PASTE_YOUR_MODEL_LINK_HERE"){
    showError('No model link has been set yet. Open this file and replace MODEL_URL near the top of the &lt;script&gt; with your file\'s link.');
    return;
  }

  const url = resolveShareLink(MODEL_URL);

  try{
    const res = await fetch(url, { mode: 'cors' });
    if(!res.ok) throw new Error('Server responded with ' + res.status);
    const buffer = await res.arrayBuffer();

    if(buffer.byteLength < 2000){
      const text = new TextDecoder('utf-8').decode(buffer);
      if(text.includes('<html') || text.includes('accounts.google.com')) throw new Error('BLOCKED');
    }

    const { obj, kind } = await smartParse(buffer);

    currentMesh = obj;
    scene.add(obj);
    frameObject(obj);

    rTris.textContent = countTriangles(obj).toLocaleString();
    fmtBadge.textContent = kind;

    loadingEl.style.display = 'none';
    hintEl.style.display = 'none';
  }catch(err){
    console.error(err);
    if(err.message === 'BLOCKED'){
      showError('This Drive link needs sign-in or a virus-scan step and can\u2019t load directly. Make sure sharing is set to "Anyone with the link", or re-host the file (e.g. on GitHub) instead.');
    } else if(err instanceof TypeError){
      showError('Blocked by the browser (CORS) or the link is unreachable. Google Drive doesn\u2019t always allow this — try a direct-hosting link (e.g. a GitHub raw file URL) instead.');
    } else {
      showError('The file could not be recognized as GLB, GLTF, OBJ, or STL.');
    }
  }
}

function showError(msg){
  loadingEl.style.display = 'none';
  hintEl.style.display = 'none';
  errorMsg.innerHTML = msg;
  errorBox.style.display = 'flex';
  fmtBadge.textContent = 'ERROR';
}

initScene();
</script>
</body>
</html>
